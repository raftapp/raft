name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog section
        id: changelog
        run: |
          # Extract the section for this version from CHANGELOG.md
          version="${{ steps.version.outputs.version }}"
          body=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          # Write to file to preserve newlines
          echo "$body" > release-body.md

          # Append CWS note
          cat >> release-body.md << 'EOF'

          ---

          📦 Raft is distributed exclusively via the [Chrome Web Store](https://chromewebstore.google.com/detail/Raft/enccggehgndcbkonehpigalbolgdifhe). No artifacts are attached to GitHub releases. Note: Chrome Web Store reviews can take a week or more, so this version may not be available immediately.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.version }}
          body_path: release-body.md
